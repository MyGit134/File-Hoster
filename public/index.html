<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>File Hoster — Доступ</title>
    <link rel="stylesheet" href="/styles.css?v=7" />
  </head>
  <body>
    <div class="ambient">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
    </div>

    <main class="page login">
      <div class="auth-card login-card">
        <p class="eyebrow">Доступ</p>
        <h1>Введите пароль</h1>
        <p class="lede">Доступ к медиа-библиотеке открыт только после ввода пароля.</p>
        <div class="auth-row">
          <input class="auth-input" id="login-input" type="password" placeholder="Пароль" autocomplete="current-password" />
          <button class="btn primary" id="login-btn" type="button">Войти</button>
        </div>
        <p class="auth-error" id="login-error"></p>
      </div>
    </main>

    <script src="/login.js?v=7"></script>
  </body>
</html>
